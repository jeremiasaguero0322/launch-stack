# Usage:
#   make up         — spin up everything
#   make down       — stop containers
#   make down-clean — stop + wipe volumes (fresh DB)
#   make logs       — tail all container logs
#
# Ports:
#   3000 — Next.js app
#   8288 — Inngest dashboard
#   5433 — PostgreSQL (for local tools like psql/pgAdmin)

x-app-build-args: &app-build-args
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
  # OPENAI_API_KEY removed — passed only as runtime env var, never baked into image layers

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pdr_ai_v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: pdr_ai_v2
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdr_ai_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      args:
        <<: *app-build-args
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/pdr_ai_v2
      SKIP_ENV_VALIDATION: "1"
    restart: "no"

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: pdr_ai_v2-seaweedfs
    entrypoint: /etc/seaweedfs/entrypoint.sh
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-pdr_local_key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-pdr_local_secret}
    volumes:
      - seaweedfs_data:/data
      - ./docker/filer.toml:/etc/seaweedfs/filer.toml:ro
      - ./docker/seaweedfs-entrypoint.sh:/etc/seaweedfs/entrypoint.sh:ro
  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: pdr_ai_v2-sidecar
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Optional: Docling-powered OCR for Office docs (DOCX, PPTX, XLSX, EPUB).
  # Adds ~800MB RAM. Skip with: docker compose up (without --profile ocr)
  # Enable with:  docker compose --profile ocr up
  docling-serve:
    image: ghcr.io/docling-project/docling-serve
    container_name: pdr_ai_v2-docling-serve
    profiles: ["ocr"]
    restart: unless-stopped
    environment:
      DOCLING_SERVE_MAX_NUM_PAGES: "200"
    volumes:
      - docling_models:/opt/app-root/src/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # OCR router sidecar — runs vision classification + PDF rendering
  # for document routing decisions (moved out of the Next.js app to reduce build time)
  ocr-router:
    build:
      context: ./services/ocr-router
      dockerfile: Dockerfile
    container_name: pdr_ai_v2-ocr-router
    restart: unless-stopped
    environment:
      # AI vision — used for OpenAI-based document classification (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      OCR_VISION_MODEL: ${OCR_VISION_MODEL:-gpt-4o-mini}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ocr-worker:
    build:
      context: ./services/ocr-worker
      dockerfile: Dockerfile
    container_name: pdr_ai_v2-ocr-worker
    profiles: ["ocr"]
    restart: unless-stopped
    depends_on:
      docling-serve:
        condition: service_healthy
    environment:
      DOCLING_SERVE_URL: http://docling-serve:5001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        <<: *app-build-args
    container_name: pdr_ai_v2-app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      seaweedfs:
        condition: service_started
      sidecar:
        condition: service_healthy
      ocr-router:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/pdr_ai_v2
      # AI providers — global + per-capability
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      RERANK_MODEL: ${RERANK_MODEL:-}
      NER_MODEL: ${NER_MODEL:-}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-}
      TRANSCRIPTION_API_BASE_URL: ${TRANSCRIPTION_API_BASE_URL:-}
      TRANSCRIPTION_API_KEY: ${TRANSCRIPTION_API_KEY:-}
      # Auth
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      # Services
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
      NEXT_PUBLIC_UPLOADTHING_ENABLED: ${NEXT_PUBLIC_UPLOADTHING_ENABLED:-}
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-}
      INNGEST_DEV: http://inngest-dev:8288
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DATALAB_API_KEY: ${DATALAB_API_KEY:-}
      AZURE_DOC_INTELLIGENCE_ENDPOINT: ${AZURE_DOC_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOC_INTELLIGENCE_KEY: ${AZURE_DOC_INTELLIGENCE_KEY:-}
      LANDING_AI_API_KEY: ${LANDING_AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      TOKEN_SIGNUP_BONUS: ${TOKEN_SIGNUP_BONUS:-10000000}
      NEXT_PUBLIC_STORAGE_PROVIDER: s3
      NEXT_PUBLIC_S3_ENDPOINT: http://seaweedfs:8333
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-pdr_local_key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-pdr_local_secret}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-launchstack}
      # Adeu DOCX redlining service
      ADEU_SERVICE_URL: http://sidecar:8000
      # OCR router sidecar — vision classification + PDF rendering
      OCR_ROUTER_URL: http://ocr-router:8002
      # OSS OCR worker (thin proxy → docling-serve) — only set when using --profile ocr
      OCR_WORKER_URL: ${OCR_WORKER_URL:-}
      OCR_DEFAULT_PROVIDER: ${OCR_DEFAULT_PROVIDER:-DOCLING}
    ports:
      - "3000:3000"

  inngest-dev:
    image: inngest/inngest:latest
    container_name: pdr_ai_v2-inngest
    restart: unless-stopped
    ports:
      - "${INNGEST_PORT:-8288}:8288"
    command: inngest dev -u http://app:3000/api/inngest
    depends_on:
      - app

volumes:
  postgres_data:
  seaweedfs_data:
  docling_models:
