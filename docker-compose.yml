# Pass env file as argument: docker compose --env-file .env up
#
# Profiles:
#   default (no flag)        — db + migrate + app
#   --profile dev            — adds Inngest dev server, Neo4j, and sidecar (BERT embeddings)
#   --profile minimal        — db only (for local Next.js dev with `pnpm dev`)
#   --profile neo4j          — adds Neo4j only
#
# Examples:
#   docker compose --env-file .env up                           # production-like
#   docker compose --env-file .env --profile dev up             # with Inngest, Neo4j, sidecar
#   docker compose --env-file .env --profile minimal up db      # just the database

x-app-build-args: &app-build-args
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pdr_ai_v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: pdr_ai_v2
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdr_ai_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
      args:
        <<: *app-build-args
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/pdr_ai_v2
      SKIP_ENV_VALIDATION: "1"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        <<: *app-build-args
    container_name: pdr_ai_v2-app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/pdr_ai_v2
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
      NEXT_PUBLIC_UPLOADTHING_ENABLED: ${NEXT_PUBLIC_UPLOADTHING_ENABLED:-}
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-}
      INNGEST_DEV: http://inngest-dev:8288
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DATALAB_API_KEY: ${DATALAB_API_KEY:-}
      AZURE_DOC_INTELLIGENCE_ENDPOINT: ${AZURE_DOC_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOC_INTELLIGENCE_KEY: ${AZURE_DOC_INTELLIGENCE_KEY:-}
      LANDING_AI_API_KEY: ${LANDING_AI_API_KEY:-}
      # Anthropic / Google (optional — enables Claude and Gemini models)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
      # Ollama (optional — set OLLAMA_BASE_URL to an Ollama instance)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      # Neo4j (optional — enables graph storage and exploration)
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Gemma extraction via Ollama (optional — enables relationship extraction)
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-}
      # Extraction LLM (optional — model-agnostic relationship extraction)
      EXTRACTION_LLM_BASE_URL: ${EXTRACTION_LLM_BASE_URL:-}
      EXTRACTION_LLM_MODEL: ${EXTRACTION_LLM_MODEL:-}
      EXTRACTION_LLM_API_KEY: ${EXTRACTION_LLM_API_KEY:-}
      # Embedding provider (optional — defaults to BERT via Sidecar)
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-}
      # Entity resolution (optional — cosine similarity threshold for dedup)
      ENTITY_RESOLUTION_THRESHOLD: ${ENTITY_RESOLUTION_THRESHOLD:-}
    ports:
      - "3000:3000"

  # Neo4j graph database — entity graph storage and exploration
  # Start with: docker compose --profile dev up  (or --profile neo4j)
  # Browser: http://localhost:7474  (login: neo4j / <NEO4J_PASSWORD>)
  neo4j:
    image: neo4j:5-community
    container_name: pdr_ai_v2-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - neo4j

  # Python sidecar — BERT embeddings and ML inference
  # Start with: docker compose --profile dev up
  # API: http://localhost:8000
  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: pdr_ai_v2-sidecar
    restart: unless-stopped
    environment:
      SIDECAR_API_KEY: ${SIDECAR_API_KEY:-}
    volumes:
      - sidecar_model_cache:/app/model-cache
    ports:
      - "8000:8000"
    profiles:
      - dev

  # Inngest dev server — local dashboard & event processing for development
  # Start with: docker compose --profile dev up
  # Dashboard: http://localhost:8288
  inngest-dev:
    image: inngest/inngest:latest
    container_name: pdr_ai_v2-inngest
    restart: unless-stopped
    ports:
      - "8288:8288"
    command: inngest dev -u http://app:3000/api/inngest
    depends_on:
      - app
    profiles:
      - dev

volumes:
  postgres_data:
  neo4j_data:
  sidecar_model_cache:
